[server]
ws_addr   = "127.0.0.1:8080"
grpc_addr = "0.0.0.0:50051"

[clients]
talker_addr        = "http://127.0.0.1:50053"
reasoner_addr      = "http://127.0.0.1:50054"
listener_grpc_addr = "http://127.0.0.1:50055"
listener_audio_addr = "127.0.0.1:50056"

[files]
soul_path      = "config/SOUL.md"
identity_path  = "config/IDENTITY.md"
workspace_root = "."

[history]
max_recent_turns = 50

[silence]
soft_prompt_secs   = 3
follow_up_secs     = 8
context_shift_secs = 30

[rag]
db_path = "data/kaguya.db"
# embedding_url = "http://127.0.0.1:8081"
top_k = 10
# Defensive cap on stored memory content (chars). Real voice utterances
# never approach this; guards against pathological pastes (REF-010).
max_storage_chars = 4096
# Output-side caps (chars) applied at retrieval / export time. Defaults
# unlimited — let the model context budget govern. Set to bound per-turn
# prompt cost when many retrievals fire (REF-010).
# max_chars_per_result = 400
# max_chars_per_md_entry = 300
