# buf.yaml — CI-only proto linting and breaking-change detection.
#
# Used exclusively in .github/workflows/proto-lint.yml for validation.
# NOT used for code generation — we use language-specific tools:
#   - Python: grpcio-tools (talker/scripts/gen_proto.py)
#   - Rust: tonic-build (gateway/build.rs, automatic on cargo build)
#   - TypeScript: @grpc/proto-loader (runtime loading, no generation)

version: v1
name: buf.build/kaguya/kaguya
lint:
  use: [STANDARD]
  except:
    # Our RPC request/response messages use semantic domain names (TalkerContext,
    # TalkerOutput, ListenerEvent, PersonaConfig, etc.) rather than the mechanical
    # FooRequest/FooResponse convention. These names are canonical — codified in
    # implementation-plan-v0.1.0.md §3 and referenced throughout the codebase.
    # No message is shared across RPCs, so the accidental-reuse risk is moot.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use: [FILE]
