syntax = "proto3";
package kaguya.listener;

service ListenerService {
  // Listener 向 Gateway 推送事件流（VAD + STT）
  rpc StreamEvents(stream ListenerEvent) returns (ListenerAck);
}

message ListenerEvent {
  oneof event {
    VadSignal   vad        = 1;
    Transcript  transcript = 2;
  }
}

message VadSignal {
  enum Type { SPEECH_START = 0; SPEECH_END = 1; }
  Type type = 1;
}

message Transcript {
  string text       = 1;
  bool   is_final   = 2;
  float  confidence = 3;
}

message ListenerAck { bool ok = 1; }