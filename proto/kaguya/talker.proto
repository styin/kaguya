syntax = "proto3";
package kaguya.talker;

service TalkerService {
  // 发送 context package，接收流式输出
  rpc ProcessPrompt(ContextPackage) returns (stream TalkerOutput);
  // PREPARE 信号：打断当前生成
  rpc Prepare(PrepareSignal)        returns (PrepareAck);
  // 投机预填充（n_predict: 0）
  rpc PrefillCache(PrefillRequest)  returns (PrefillAck);
  // 人格/记忆配置推送
  rpc UpdatePersona(PersonaConfig)  returns (PersonaAck);
}

// ── Gateway → Talker ──

message ContextPackage {
  string user_input            = 1;
  string memory_contents       = 2;  // MEMORY.md 全文
  repeated Turn history        = 3;
  repeated ActiveTask tasks    = 4;
  repeated ToolInfo tools      = 5;
  repeated AsyncResult results = 6;  // 待处理的工具/推理结果
  map<string, string> metadata = 7;  // 时间、时区等
}

message Turn {
  string role      = 1;  // "user" | "assistant" | "tool" | "reasoner"
  string content   = 2;
  int64 timestamp  = 3;
  bool interrupted = 4;  // 被打断的助手回复（仅 spoken 部分）
}

message ActiveTask {
  string task_id     = 1;
  string description = 2;
  string status      = 3;
}

message ToolInfo {
  string name              = 1;
  string description       = 2;
  string parameters_schema = 3;  // JSON Schema
}

message AsyncResult {
  string source     = 1;  // "tool" | "reasoner"
  string name_or_id = 2;
  string content    = 3;
  bool   success    = 4;
}

message PrepareSignal {
  string session_id = 1;
}

message PrepareAck {
  bool   was_speaking  = 1;
  string spoken_text   = 2;  // 已经说出的部分
  string unspoken_text = 3;  // 被截断的部分
}

message PrefillRequest {
  string session_id     = 1;
  ContextPackage context = 2;
}
message PrefillAck {
  bool  ok            = 1;
  int32 cached_tokens = 2;
}

message PersonaConfig {
  string soul_md     = 1;
  string identity_md = 2;
  string memory_md   = 3;
}
message PersonaAck { bool ok = 1; }

// ── Talker → Gateway (流式返回) ──

message TalkerOutput {
  oneof payload {
    TextChunk        text     = 1;
    AudioChunk       audio    = 2;
    EmotionTag       emotion  = 3;
    ToolCallRequest  tool     = 4;  // [TOOL:...]
    DelegateRequest  delegate = 5;  // [DELEGATE:...]
    ResponseComplete complete = 6;
  }
}

message TextChunk        { string content = 1; bool is_final = 2; }
message AudioChunk       { bytes data = 1; uint32 sample_rate = 2; }
message EmotionTag       { string emotion = 1; float intensity = 2; }
message ToolCallRequest  { string call_id = 1; string tool_name = 2; string params_json = 3; }
message DelegateRequest  { string task_description = 1; string context_json = 2; }
message ResponseComplete { string full_text = 1; }