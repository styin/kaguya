syntax = "proto3";
package kaguya.v1;

// ─────────────────────────────────────────────
// SHARED TYPES
// ─────────────────────────────────────────────

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_SYSTEM      = 1;
  ROLE_USER        = 2;
  ROLE_ASSISTANT   = 3;
  ROLE_TOOL        = 4;
}

message ChatMessage {
  Role   role         = 1;
  string content      = 2;
  string name         = 3;
  int64  timestamp_ms = 4;
}

message ToolDefinition {
  string name        = 1;
  string description = 2;
  string args_schema = 3;
}

// LISTENER SERVICE — Bidi streaming
// Gateway = client, Listener = server
//
// Audio bytes do NOT flow over this gRPC stream. The Gateway forwards raw
// audio frames over a separate TCP socket (length-prefixed framing) at
// `listener_audio_addr`. Reasoning: 50fps audio + protobuf serialization
// overhead is wasteful for the Phase-1 local-only deployment, and gRPC's
// HTTP/2 framing adds head-of-line blocking that voice latency can't
// afford. See `docs/spec-agent-v0.1.0.md` and the raw-socket forwarder in
// `gateway/src/listener.rs`.
//
// Tag 1 in `ListenerInput.payload` is reserved (was `AudioChunk`); do not
// reuse, in case the audio path ever moves back in-band.

service ListenerService {
  // Bidi: Gateway sends control signals; Listener streams ASR events.
  rpc Stream(stream ListenerInput) returns (stream ListenerOutput);
}

message ListenerInput {
  oneof payload {
    // Tag 1 reserved (was AudioChunk). Audio flows over the raw TCP socket.
    ListenerControl  control = 2;
  }
}

message ListenerControl {
  oneof signal {
    ListenerReset reset = 1;  // clear VAD state on new session
  }
}
message ListenerReset {}

message ListenerOutput {
  int64 timestamp_ms = 1;
  oneof event {
    VadSpeechStart    vad_speech_start   = 2;
    VadSpeechEnd      vad_speech_end     = 3;
    PartialTranscript partial_transcript = 4;
    FinalTranscript   final_transcript   = 5;
  }
}

message VadSpeechStart    {}
message VadSpeechEnd      { float silence_duration_ms = 1; }
message PartialTranscript { string text = 1; }
message FinalTranscript   { string text = 1; float confidence = 2; }

// TALKER SERVICE — Bidi ProcessPrompt + unary helpers
// Gateway = client, Talker = server


service TalkerService {
  // Bidi: Gateway sends context + inline barge-in; Talker streams output
  rpc Converse(stream TalkerInput) returns (stream TalkerOutput);

  // Between-turn operations (unary, no need for bidi)
  rpc PrefillCache(PrefillRequest) returns (PrefillAck);
  rpc UpdatePersona(PersonaConfig) returns (PersonaAck);
}

message TalkerInput {
  oneof payload {
    TalkerContext    start    = 1;  // begin generation
    BargeInSignal    barge_in = 2;  // interrupt mid-stream (was separate Prepare RPC)
  }
}

message BargeInSignal {
  string conversation_id = 1;
}

// TalkerContext 保持不变
message TalkerContext {
  string   conversation_id          = 1;
  string   turn_id                  = 2;
  string   user_input               = 3;
  repeated ChatMessage history      = 4;
  string   memory_contents          = 5;
  repeated ToolDefinition tools     = 6;
  string   active_tasks_json        = 7;
  string   tool_result_content      = 8;
  string   tool_request_id          = 9;
  int64    timestamp_ms             = 10;
  string   reasoner_task_id         = 11;
  string   reasoner_result_content  = 12;
  // ── NEW: RAG retrieval results ──
  repeated RetrievalResult retrieval_results = 13;
}

// NEW: RAG 检索结果，注入到 context 中
message RetrievalResult {
  string id       = 1;
  string content  = 2;
  string source   = 3;  // "bm25" | "vector" | "lsp" | "structured"
  float  score    = 4;
}

message TalkerOutput {
  uint32 seq = 1;
  oneof payload {
    ResponseStarted  response_started  = 2;
    SentenceEvent    sentence          = 3;
    EmotionEvent     emotion           = 4;
    ToolRequest      tool_request      = 5;
    DelegateRequest  delegate_request  = 6;
    ResponseComplete response_complete = 7;
    BargeInAck       barge_in_ack      = 8;  // NEW: inline response to barge-in
  }
}

message BargeInAck {
  string spoken_text   = 1;
  string unspoken_text = 2;
}

message ResponseStarted  { string turn_id = 1; }
message SentenceEvent    { string text = 1; }
message EmotionEvent     { string emotion = 1; }

message ToolRequest {
  string request_id = 1;
  string tool_name  = 2;
  string args_json  = 3;
}

message DelegateRequest {
  string task_id     = 1;
  string description = 2;
}

message ResponseComplete {
  string turn_id         = 1;
  bool   was_interrupted = 2;
}

message PrefillRequest {
  string conversation_id = 1;
  TalkerContext context  = 2;
}
message PrefillAck {}

message PersonaConfig {
  string soul_md     = 1;
  string identity_md = 2;
  string memory_md   = 3;
}
message PersonaAck {}


// REASONER SERVICE — Multi-stream design


service ReasonerService {
  // Bidi per-task: Gateway sends task + context updates, Reasoner streams events
  rpc Delegate(stream DelegateInput) returns (stream DelegateOutput);

  // Unary interrupt: always available, even when no delegation in flight
  rpc Interrupt(InterruptRequest) returns (InterruptAck);

  // Server-streaming telemetry: continuous background context
  rpc Telemetry(TelemetrySubscribe) returns (stream TelemetryEvent);
}

message DelegateInput {
  oneof payload {
    TaskRequest   start_task     = 1;
    TaskContext    context_update = 2;  // NEW: send updated context mid-task
  }
}

message TaskRequest {
  string task_id     = 1;
  string description = 2;
  map<string, string> metadata = 3;
}

message TaskContext {
  string task_id   = 1;
  string context   = 2;  // additional context during execution
}

message DelegateOutput {
  string task_id      = 1;
  int64  timestamp_ms = 2;
  oneof event {
    ReasonerStarted          started   = 3;
    ReasonerIntermediateStep step      = 4;
    ReasonerOutput           output    = 5;
    ReasonerCompleted        completed = 6;
    ReasonerError            error     = 7;
  }
}

message ReasonerStarted          { string framework = 1; }
message ReasonerIntermediateStep { string description = 1; }
message ReasonerOutput           { string content = 1; }
message ReasonerCompleted        { string summary = 1; }
message ReasonerError            { string message = 1; int32 code = 2; }

message InterruptRequest {
  oneof signal {
    TaskCancel  cancel   = 1;
    GlobalStop  stop     = 2;
    Shutdown    shutdown = 3;
  }
}
message TaskCancel { string task_id = 1; }
message GlobalStop {}
message Shutdown   {}
message InterruptAck {}

message TelemetrySubscribe {}
message TelemetryEvent {
  string source      = 1;  // "openclaw" | "claude_code"
  string event_type  = 2;
  string data        = 3;  // JSON
  int64  timestamp_ms = 4;
}

// ─────────────────────────────────────────────
// GATEWAY CONTROL (Endpoint → Gateway)
// ─────────────────────────────────────────────

service RouterControlService {
  rpc SendControl(ControlSignal) returns (ControlAck);
}

message ControlSignal {
  oneof signal {
    StopSignal     stop     = 1;
    ApprovalSignal approval = 2;
    ShutdownSignal shutdown = 3;
  }
}
message StopSignal     {}
message ApprovalSignal { string context = 1; }
message ShutdownSignal {}
message ControlAck {}
