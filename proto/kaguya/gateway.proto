syntax = "proto3";
package kaguya.gateway;

// 外部控制 Gateway（Phase 2: OpenPod control channel）
service GatewayControl {
  rpc SendControl(ControlSignal) returns (ControlAck);
}

message ControlSignal {
  oneof signal {
    StopSignal     stop     = 1;
    ApprovalSignal approval = 2;
    ShutdownSignal shutdown = 3;
  }
}

message StopSignal     {}
message ApprovalSignal { string request_id = 1; }
message ShutdownSignal { bool graceful = 1; }
message ControlAck     { bool ok = 1; string message = 2; }