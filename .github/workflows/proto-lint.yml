name: Proto Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main branch for breaking change detection
        run: git fetch origin main:main || true
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint proto/
      - name: Check if main has proto files
        id: has_baseline
        run: |
          if git show main:proto/kaguya/v1/kaguya.proto > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Breaking change detection
        if: steps.has_baseline.outputs.exists == 'true'
        run: buf breaking proto/ --against '.git#branch=main'
